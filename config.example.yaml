# Video Companion 配置 — AI VTuber 实时感知与互动核心
# 复制为 config.yaml 后填入 API Key
# 独立运行模式，不依赖 Project Mnemosyne / 忆界树

project:
  mode: "standalone_ai_vtuber"
  name: "Video Companion"
  description: "AI VTuber realtime perception and interaction core"

server:
  host: "127.0.0.1"
  port: 8001
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"

camera:
  default_width: 640
  default_height: 480
  default_fps: 15
  capture_interval_sec: 2.0
  default_on: false

microphone:
  sample_rate: 16000
  chunk_size: 1024
  default_on: false
  vad_enabled: true
  vad_silence_threshold_ms: 800
  vad_speech_threshold_ms: 200

# 本地视觉检测 (OpenCV)
local_vision:
  detection_interval_sec: 1.0
  enabled_detectors:
    - face
    - motion
  face_confidence: 0.5
  motion_sensitivity: 0.3

# 外部视觉模型 — 默认关闭，使用 mock
vision_provider:
  default_on: false
  provider: mock             # mock | openai | anthropic
  model: gpt-4o
  max_frames_per_minute: 6
  max_cost_per_hour: 0.5
  max_cost_per_day: 2.0
  max_resolution: 1024
  fallback_on_limit: skip
  api_key_env: "OPENAI_API_KEY"
  api_base: "https://api.openai.com/v1"

# 语音 — 默认 mock。有 API key 时可改为 openai_whisper / openai_tts / elevenlabs
speech:
  asr:
    provider: mock              # mock | openai_whisper
    model: whisper-1
    language: zh
  tts:
    provider: mock              # mock | openai_tts | elevenlabs
    model: tts-1
    voice: alloy
    speed: 1.0
    streaming: true
    interruptible: true
  api_key_env: "OPENAI_API_KEY"

# Legacy bridge — Mnemosyne 桥接（默认关闭，仅历史兼容）
legacy_bridge:
  enabled: false
  api_base: "http://127.0.0.1:8000"
  api_key_env: "MNEMOSYNE_API_KEY"
  timeout: 10
  retries: 2

# AI VTuber 角色
persona:
  name: "Mio"
  display_name: "澪"
  language: "zh"
  style: "自然、简短、温和、稍微冷静"
  max_reply_chars: 100
  allow_visual_comment: true
  avoid_fake_memory: true

# 隐私
privacy:
  defaults:
    camera: false
    microphone: false
    external_vision: false
    save_summary: false
    save_observation: false
  save_raw_media: false
  log_redact_pii: true
  camera_default: false
  microphone_default: false
  external_vision_default: false

# 成本
cost:
  max_frames_per_minute: 6
  max_cost_per_hour: 0.5
  max_cost_per_day: 2.0
  on_limit: skip
