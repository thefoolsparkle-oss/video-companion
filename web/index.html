<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI VTuber</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Top Status Bar -->
<header id="topbar">
  <span class="status-item"><span class="dot" id="dot-vc"></span> video-companion</span>
  <span class="status-item"><span class="dot" id="dot-ws"></span> WebSocket</span>
  <span class="status-item" id="label-session">无会话</span>
  <span class="status-item" id="label-timer">00:00</span>
  <span class="status-item">Turns: <b id="label-turns">0</b></span>
  <span class="mock-badge" id="mock-asr">ASR: mock</span>
  <span class="mock-badge" id="mock-tts">TTS: mock</span>
  <span class="mock-badge" id="mock-vision">Vision: mock</span>
</header>

<!-- Main Layout -->
<main id="main-layout">
  <!-- Left: Avatar + Hardware -->
  <section id="left-panel">
    <div class="avatar-card" id="avatar-card">
      <div class="avatar-face" id="avatar-face">澪</div>
      <div class="avatar-name">澪 (Mio)</div>
      <div class="mouth-bar" id="mouth-bar"></div>
      <div class="avatar-info">
        <div class="info-row"><b>表情</b> <span id="av-expression">idle</span></div>
        <div class="info-row"><b>说话</b> <span id="av-speaking">-</span></div>
        <div class="info-row"><b>注视</b> <span id="av-looking">-</span></div>
      </div>
    </div>

    <div class="hw-section">
      <h3 class="hw-title">硬件验收</h3>

      <!-- Camera -->
      <div class="hw-block">
        <div class="hw-header">
          <span class="dot" id="dot-cam"></span>
          <strong>摄像头</strong>
          <button id="btn-cam-toggle" onclick="App.toggleCamera()">开启</button>
        </div>
        <video id="cam-preview" autoplay playsinline muted></video>
        <canvas id="cam-canvas" style="display:none"></canvas>
        <div class="hw-meta">
          <span>发送帧: <b id="cam-frames">0</b></span>
          <span>检测: <span class="presence-tag unknown" id="hw-presence">-</span></span>
        </div>
        <div id="cam-error" class="hw-error" style="display:none"></div>
      </div>

      <!-- Mic -->
      <div class="hw-block">
        <div class="hw-header">
          <span class="dot" id="dot-mic"></span>
          <strong>麦克风</strong>
          <button id="btn-mic-toggle" onclick="App.toggleMic()">开启</button>
        </div>
        <div class="meter-bar">
          <div class="meter-fill" id="mic-meter" style="width:0%"></div>
        </div>
        <div class="hw-meta">
          <span>发送段: <b id="mic-segments">0</b></span>
          <span class="mock-badge" style="font-size:10px">ASR mock — 不代表真实识别</span>
        </div>
        <div id="mic-error" class="hw-error" style="display:none"></div>
        <div id="mic-debug" class="mic-debug" style="display:none">Mic: off | Level: 0.00 | Ctx: -- | Track: --</div>
      </div>

      <!-- Observation -->
      <div class="hw-block">
        <div class="hw-header"><strong>最近 observation</strong></div>
        <pre id="obs-raw" class="obs-raw">等待帧数据...</pre>
      </div>
    </div>
  </section>

  <!-- Right: Chat -->
  <section id="chat-panel">
    <div class="chat-messages" id="messages">
      <p class="placeholder-msg">点击"开始会话"连接 AI VTuber</p>
    </div>
    <div class="chat-input-bar">
      <input type="text" id="text-input" placeholder="输入消息..." disabled>
      <button id="btn-send" onclick="App.sendText()" disabled>发送</button>
      <button id="btn-session" class="primary" onclick="App.startSession()">开始会话</button>
      <button id="btn-stop" class="danger" onclick="App.stopSession()" disabled>停止</button>
    </div>
    <div class="summary-bar" id="summary-bar">
      <strong>会话摘要</strong>
      <p id="summary-text"></p>
      <p class="summary-meta">时长: <span id="summary-dur"></span> | 轮次: <span id="summary-turns"></span></p>
    </div>
  </section>
</main>

<script src="app.js"></script>
</body>
</html>
