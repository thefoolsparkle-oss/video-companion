<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Companion</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <header>
            <div class="header-left">
                <h1>Video Companion</h1>
                <span id="version-tag">v0.8</span>
            </div>
            <div class="header-right">
                <span id="audio-visualizer" class="visualizer">
                    <span class="bar"></span><span class="bar"></span><span class="bar"></span>
                    <span class="bar"></span><span class="bar"></span>
                </span>
                <span id="connection-status" class="status-badge disconnected">未连接</span>
            </div>
        </header>

        <main>
            <div class="grid">
                <!-- 左栏：视频 -->
                <div class="grid-left">
                    <section id="video-section">
                        <div id="camera-container">
                            <video id="camera-preview" autoplay playsinline muted></video>
                            <canvas id="camera-canvas" style="display:none"></canvas>
                            <div id="camera-overlay" class="overlay">
                                <div class="overlay-content">
                                    <span class="icon">📷</span>
                                    <span>摄像头未开启</span>
                                    <small>请授权后开始</small>
                                </div>
                            </div>
                            <div id="detection-overlay" class="detection-hud hidden">
                                <div id="face-box" class="face-box hidden"></div>
                            </div>
                        </div>
                        <div class="camera-info">
                            <span id="camera-status">摄像头: 关闭</span>
                            <span id="frame-count" class="metric">帧: 0</span>
                            <span id="fps-display" class="metric">FPS: 0</span>
                        </div>
                    </section>

                    <!-- 观察面板 -->
                    <section id="observation-panel">
                        <h3>画面观察 <span id="obs-timestamp" class="metric"></span></h3>
                        <div id="observation-detail">
                            <div class="obs-row">
                                <span class="obs-label">用户</span>
                                <span id="obs-presence" class="obs-value">-</span>
                            </div>
                            <div class="obs-row">
                                <span class="obs-label">人脸</span>
                                <span id="obs-face" class="obs-value">-</span>
                            </div>
                            <div class="obs-row">
                                <span class="obs-label">动作</span>
                                <span id="obs-motion" class="obs-value">-</span>
                            </div>
                            <div class="obs-row">
                                <span class="obs-label">画质</span>
                                <span id="obs-quality" class="obs-value">-</span>
                            </div>
                            <div class="obs-row" id="obs-external-row" style="display:none">
                                <span class="obs-label">AI分析</span>
                                <span id="obs-external" class="obs-value"></span>
                            </div>
                        </div>
                    </section>
                </div>

                <!-- 右栏：控制和对话 -->
                <div class="grid-right">
                    <!-- 授权 -->
                    <section id="controls">
                        <h3>授权控制</h3>
                        <div class="toggle-list">
                            <label class="toggle-item">
                                <span class="toggle-label">
                                    <span class="icon">📷</span> 摄像头
                                </span>
                                <input type="checkbox" id="consent-camera" class="toggle-input">
                                <span class="toggle-slider"></span>
                            </label>
                            <label class="toggle-item">
                                <span class="toggle-label">
                                    <span class="icon">🎤</span> 麦克风
                                </span>
                                <input type="checkbox" id="consent-microphone" class="toggle-input">
                                <span class="toggle-slider"></span>
                            </label>
                            <label class="toggle-item">
                                <span class="toggle-label">
                                    <span class="icon">🤖</span> 外部视觉分析
                                </span>
                                <input type="checkbox" id="consent-vision" class="toggle-input">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                    </section>

                    <!-- 会话 -->
                    <section id="session-controls">
                        <h3>会话控制</h3>
                        <div class="button-row">
                            <button id="btn-start-session" class="btn primary">▶ 开始会话</button>
                            <button id="btn-stop-session" class="btn danger" disabled>⏹ 结束</button>
                        </div>
                        <div class="button-row" style="margin-top:8px">
                            <button id="btn-pause-session" class="btn secondary" disabled>⏸ 暂停</button>
                            <button id="btn-interrupt" class="btn warning" disabled>🔇 打断</button>
                        </div>
                    </section>

                    <!-- 状态 -->
                    <section id="status-panel">
                        <h3>会话状态</h3>
                        <div class="status-grid">
                            <div class="stat">
                                <span class="stat-label">状态</span>
                                <span id="session-state" class="stat-value">未开始</span>
                            </div>
                            <div class="stat">
                                <span class="stat-label">时长</span>
                                <span id="session-duration" class="stat-value">0s</span>
                            </div>
                            <div class="stat">
                                <span class="stat-label">轮次</span>
                                <span id="session-turns" class="stat-value">0</span>
                            </div>
                            <div class="stat">
                                <span class="stat-label">延迟</span>
                                <span id="session-latency" class="stat-value">- ms</span>
                            </div>
                            <div class="stat">
                                <span class="stat-label">外部分析</span>
                                <span id="session-ext-analyzes" class="stat-value">0</span>
                            </div>
                            <div class="stat">
                                <span class="stat-label">费用</span>
                                <span id="session-cost" class="stat-value">$0.00</span>
                            </div>
                        </div>
                    </section>

                    <!-- 文本输入 -->
                    <section id="text-input-section">
                        <h3>文本输入 (键盘回退)</h3>
                        <div class="input-row">
                            <input type="text" id="text-input" placeholder="输入文字发送..." />
                            <button id="btn-send-text" class="btn primary" disabled>发送</button>
                        </div>
                    </section>
                </div>

                <!-- 对话日志 (全宽) -->
                <div class="grid-full">
                    <section id="transcript-panel">
                        <div class="transcript-header">
                            <h3>对话记录</h3>
                            <button id="btn-clear-transcript" class="btn-small">清除</button>
                        </div>
                        <div id="transcript-log">
                            <p class="placeholder">等待会话开始...</p>
                        </div>
                    </section>
                </div>
            </div>
        </main>

        <footer>
            <p>Video Companion v0.8 · 隐私优先 · 默认关闭 · 显式授权</p>
        </footer>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
